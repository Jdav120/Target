version: 0.2

phases:
  pre_build:
    commands:
      - dotnet --version
      - dotnet restore Target.sln

  build:
    commands:
      - dotnet publish Target.sln -c Release -o ./publish

  post_build:
    commands:
      - echo "web: dotnet Target.dll" > ./publish/Procfile    # ← create it directly, no need for a file in repo
      - cp -r .ebextensions ./publish/ 2>/dev/null || true
      - cd publish && zip -r ../app.zip . && cd ..

artifacts:
  files:
    - app.zip
  discard-paths: yes
