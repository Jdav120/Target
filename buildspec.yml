version: 0.2

phases:
  pre_build:
    commands:
      - dotnet --version
      - dotnet restore Target.sln

  build:
    commands:
      - dotnet publish Target.sln -c Release -o ./publish

  post_build:
    commands:
      - cp aws-windows-deployment-manifest.json ./publish/
      - cp web.config ./publish/ 2>/dev/null || true
      - apt-get update -y && apt-get install -y zip
      - cd publish && zip -r site.zip . --exclude aws-windows-deployment-manifest.json && cd ..
      - mkdir deploy
      - cp publish/aws-windows-deployment-manifest.json deploy/
      - cp publish/site.zip deploy/
      - cd deploy && zip -r ../app.zip . && cd ..

artifacts:
  files:
    - app.zip
  discard-paths: yes
