version: 0.2

phases:
  pre_build:
    commands:
      - dotnet --version
      - dotnet restore Target.sln

  build:
    commands:
      - dotnet publish Target.sln -c Release -o ./publish

  post_build:
    commands:
      - cp Procfile ./publish/
      - cp -r .ebextensions ./publish/ 2>/dev/null || true
      - python3 -c "import shutil; shutil.make_archive('app', 'zip', 'publish')"

artifacts:
  files:
    - app.zip
  discard-paths: yes
