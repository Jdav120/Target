version: 0.2

phases:
  install:
    commands:
      - curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 8.0
      - export PATH="$HOME/.dotnet:$PATH"
      - dotnet --version
      - find . -name "*.sln" -o -name "*.csproj"   # confirm file names

  pre_build:
    commands:
      - export PATH="$HOME/.dotnet:$PATH"
      - dotnet restore Target.sln

  build:
    commands:
      - export PATH="$HOME/.dotnet:$PATH"
      - dotnet publish Target.sln -c Release -o ./publish

  post_build:
    commands:
      - export PATH="$HOME/.dotnet:$PATH"
      - cp Procfile ./publish/
      - cp -r .ebextensions ./publish/ 2>/dev/null || true
      - cd publish && zip -r ../app.zip . && cd ..

artifacts:
  files:
    - app.zip
  discard-paths: yes
