version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 6.0 # Use the version required for your project
  pre_build:
    commands:
      - dotnet restore
  build:
    commands:
      - dotnet build --configuration Release
  post_build:
    commands:
      - dotnet publish -c Release -o ./publish
artifacts:
  files:
    - '**/*'
  base-directory: './publish'