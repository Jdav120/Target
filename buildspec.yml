version: 0.2

phases:
  install:
    commands:
      - curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 8.0
      - /root/.dotnet/dotnet --version    # confirm 8.0.x using direct path

  pre_build:
    commands:
      - /root/.dotnet/dotnet restore Target.sln

  build:
    commands:
      - /root/.dotnet/dotnet publish Target.sln -c Release -o ./publish

  post_build:
    commands:
      - cp Procfile ./publish/
      - cp -r .ebextensions ./publish/ 2>/dev/null || true
      - cd publish && zip -r ../app.zip . && cd ..

artifacts:
  files:
    - app.zip
  discard-paths: yes
