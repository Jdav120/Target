version: 0.2

phases:
  pre_build:
    commands:
      - dotnet --version
      - dotnet restore Target.sln

  build:
    commands:
      - dotnet publish Target.sln -c Release -o ./publish

  post_build:
    commands:
      - cp Procfile ./publish/
      - apt-get update -y && apt-get install -y zip
      - cd publish && zip -r ../app.zip . && cd ..

artifacts:
  files:
    - app.zip
  discard-paths: yes
