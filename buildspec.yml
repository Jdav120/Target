version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 8.0
  build:
    commands:
      - echo Publishing the application...
      - dotnet publish src/YourApp.csproj -c Release -o ./publish

post_build:
  commands:
    - echo Zipping the published output...
    - cd publish && zip -r ../app.zip . && cd ..
    - echo Done zipping

artifacts:
  files:
    - app.zip
    - aws-windows-deployment-manifest.json
  discard-paths: yes
