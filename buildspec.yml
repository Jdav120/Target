version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 8.0
  pre_build:
    commands:
      - dotnet restore
  build:
    commands:
      - dotnet publish -c Release -o ./output
  post_build:
    commands:
      - echo Build complete

artifacts:
  files:
    - "**/*"
  base-directory: output
